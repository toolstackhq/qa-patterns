name: Dependency Repair Agent

on:
  workflow_run:
    workflows:
      - Repository Validation
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: dependency-repair-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  VALIDATION_COMMANDS: |
    npm run test --workspace @toolstackhq/create-qa-patterns
    npm run lint --workspace @toolstackhq/playwright-template
    npm run typecheck --workspace @toolstackhq/playwright-template
    npm pack --workspace @toolstackhq/create-qa-patterns
    node --check templates/playwright-template/demo-apps/ui-demo-app/src/server.js
    node --check templates/playwright-template/demo-apps/api-demo-server/src/server.js

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.context.outputs.should_run }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      pr_title: ${{ steps.context.outputs.pr_title }}
      pr_url: ${{ steps.context.outputs.pr_url }}
      head_branch: ${{ steps.context.outputs.head_branch }}
      base_branch: ${{ steps.context.outputs.base_branch }}
      workflow_run_id: ${{ steps.context.outputs.workflow_run_id }}
      workflow_run_url: ${{ steps.context.outputs.workflow_run_url }}
    steps:
      - name: Resolve PR context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            core.setOutput("workflow_run_id", String(run.id));
            core.setOutput("workflow_run_url", run.html_url);

            if (run.conclusion !== "failure" || run.event !== "pull_request" || run.pull_requests.length === 0) {
              core.setOutput("should_run", "false");
              return;
            }

            const prNumber = run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const labels = pr.labels.map((label) => label.name);
            const branchAllowed = pr.head.ref.startsWith("deps/") || pr.head.ref.startsWith("dependabot/");
            const repairAllowed = branchAllowed || labels.includes("ai-repair-allowed");
            const alreadyAttempted = labels.includes("ai-repair-attempted");

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_title", pr.title);
            core.setOutput("pr_url", pr.html_url);
            core.setOutput("head_branch", pr.head.ref);
            core.setOutput("base_branch", pr.base.ref);
            core.setOutput("should_run", String(repairAllowed && !alreadyAttempted));

  repair:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Mark PR as AI repair attempted
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ needs.prepare.outputs.pr_number }}"),
              labels: ["ai-repair-attempted"]
            });

      - name: Collect failing logs and diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .github/ai-repair
          gh pr diff "${{ needs.prepare.outputs.pr_number }}" --name-only > .github/ai-repair/changed-files.txt
          gh run view "${{ needs.prepare.outputs.workflow_run_id }}" --log-failed > .github/ai-repair/failing.log || true

      - name: Prepare AI repair context
        env:
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          PR_TITLE: ${{ needs.prepare.outputs.pr_title }}
          PR_URL: ${{ needs.prepare.outputs.pr_url }}
          HEAD_BRANCH: ${{ needs.prepare.outputs.head_branch }}
          BASE_BRANCH: ${{ needs.prepare.outputs.base_branch }}
          WORKFLOW_RUN_ID: ${{ needs.prepare.outputs.workflow_run_id }}
          WORKFLOW_RUN_URL: ${{ needs.prepare.outputs.workflow_run_url }}
          VALIDATION_COMMANDS: ${{ env.VALIDATION_COMMANDS }}
        run: node .github/scripts/prepare-dependency-repair-context.mjs

      - name: Upload AI repair context
        uses: actions/upload-artifact@v4
        with:
          name: dependency-repair-context-${{ needs.prepare.outputs.pr_number }}
          path: .github/ai-repair

      - name: Run AI repair command
        id: ai_repair
        if: vars.AI_REPAIR_COMMAND != ''
        continue-on-error: true
        env:
          AI_REPAIR_COMMAND: ${{ vars.AI_REPAIR_COMMAND }}
          AI_REPAIR_PROMPT_FILE: .github/ai-repair/prompt.md
          AI_REPAIR_CONTEXT_FILE: .github/ai-repair/context.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash -lc "$AI_REPAIR_COMMAND"

      - name: Keep scaffold template in sync
        if: vars.AI_REPAIR_COMMAND != ''
        run: bash ./scripts/sync-scaffold-template.sh

      - name: Run repair validation
        id: validation
        if: vars.AI_REPAIR_COMMAND != ''
        continue-on-error: true
        run: |
          while IFS= read -r command; do
            [ -z "$command" ] && continue
            bash -lc "$command"
          done <<< "$VALIDATION_COMMANDS"

      - name: Detect repository changes
        id: changes
        if: vars.AI_REPAIR_COMMAND != '' && steps.validation.outcome == 'success'
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push repair
        if: vars.AI_REPAIR_COMMAND != '' && steps.validation.outcome == 'success' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: restore compatibility after dependency update"
          git push origin HEAD:${{ needs.prepare.outputs.head_branch }}

      - name: Comment repair result
        if: always()
        uses: actions/github-script@v7
        env:
          AGENT_CONFIGURED: ${{ vars.AI_REPAIR_COMMAND != '' }}
          AGENT_OUTCOME: ${{ steps.ai_repair.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          VALIDATION_COMMANDS: ${{ env.VALIDATION_COMMANDS }}
        with:
          script: |
            const prNumber = Number("${{ needs.prepare.outputs.pr_number }}");
            const agentConfigured = process.env.AGENT_CONFIGURED === "true";
            const agentOutcome = process.env.AGENT_OUTCOME || "skipped";
            const validationOutcome = process.env.VALIDATION_OUTCOME || "skipped";
            const hasChanges = process.env.HAS_CHANGES || "false";

            let body = "Dependency repair agent result:\n\n";

            if (!agentConfigured) {
              body += "- Context was collected, but `AI_REPAIR_COMMAND` is not configured.\n";
              body += "- Review the uploaded `dependency-repair-context-*` artifact and configure the agent runtime.\n";
            } else if (agentOutcome !== "success") {
              body += "- The AI repair command did not complete successfully.\n";
              body += "- Human review is required.\n";
            } else if (validationOutcome !== "success") {
              body += "- The agent made changes or attempted a fix, but validation is still failing.\n";
              body += "- Human review is required.\n";
            } else if (hasChanges === "true") {
              body += "- A repair commit was pushed to this PR branch.\n";
              body += "- Repository Validation should rerun automatically.\n";
            } else {
              body += "- No file changes were produced by the agent.\n";
              body += "- Human review is required.\n";
            }

            body += "\nValidation commands:\n";
            body += `${process.env.VALIDATION_COMMANDS}\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

            if (!agentConfigured || agentOutcome !== "success" || validationOutcome !== "success" || hasChanges !== "true") {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ["needs-human-review"]
              });
            }

      - name: Fail workflow when automated repair does not recover the PR
        if: always() && vars.AI_REPAIR_COMMAND != ''
        run: |
          if [ "${{ steps.ai_repair.outcome }}" != "success" ] || [ "${{ steps.validation.outcome }}" != "success" ] || [ "${{ steps.changes.outputs.has_changes }}" != "true" ]; then
            echo "Automated dependency repair did not produce a validated fix."
            exit 1
          fi
