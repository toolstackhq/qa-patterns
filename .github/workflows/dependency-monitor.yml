name: Dependency Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: dependency-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Check Playwright and vulnerability status
        id: monitor
        run: node .github/scripts/dependency-monitor.mjs --report-file .github/dependency-monitor-report.json

      - name: Render dependency update PR body
        if: steps.monitor.outputs.playwright_update_available == 'true'
        run: |
          cat <<EOF > .github/dependency-monitor-pr-body.md
          ## Summary

          - Current \`@playwright/test\`: ${{ steps.monitor.outputs.playwright_current_version }}
          - Latest \`@playwright/test\`: ${{ steps.monitor.outputs.playwright_latest_version }}
          - Vulnerabilities detected by \`npm audit\`: ${{ steps.monitor.outputs.vulnerabilities_total }}

          ## Validation

          Repository Validation will run automatically on this PR.

          If the PR fails, the dependency repair workflow can attempt a targeted fix on the same branch.
          EOF

      - name: Update Playwright version in templates
        if: steps.monitor.outputs.playwright_update_available == 'true'
        run: |
          node .github/scripts/update-playwright-version.mjs "${{ steps.monitor.outputs.playwright_latest_version }}"
          npm install --package-lock-only
          (
            cd templates/playwright-template
            npm install --package-lock-only
          )
          bash ./scripts/sync-scaffold-template.sh

      - name: Create dependency update PR
        if: steps.monitor.outputs.playwright_update_available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: deps/playwright-${{ steps.monitor.outputs.playwright_latest_version }}
          delete-branch: true
          commit-message: chore: update Playwright to v${{ steps.monitor.outputs.playwright_latest_version }}
          title: chore: update Playwright to v${{ steps.monitor.outputs.playwright_latest_version }}
          body-path: .github/dependency-monitor-pr-body.md
          labels: |
            dependencies
            ai-repair-allowed

      - name: Create or update vulnerability issue
        if: steps.monitor.outputs.vulnerabilities_total != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const report = JSON.parse(fs.readFileSync(".github/dependency-monitor-report.json", "utf8"));
            const title = "Dependency monitor report";
            const body = [
              "## Vulnerability summary",
              "",
              `- Total: ${report.vulnerabilities.total}`,
              `- Critical: ${report.vulnerabilities.critical}`,
              `- High: ${report.vulnerabilities.high}`,
              `- Moderate: ${report.vulnerabilities.moderate}`,
              `- Low: ${report.vulnerabilities.low}`,
              `- Info: ${report.vulnerabilities.info}`,
              "",
              `Generated at: ${report.generatedAt}`,
              "",
              "This issue was created by the scheduled dependency monitor workflow."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["dependencies"]
              });
            }

      - name: Close vulnerability issue when audit is clean
        if: steps.monitor.outputs.vulnerabilities_total == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Dependency monitor report";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
